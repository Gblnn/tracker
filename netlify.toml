[build]
  command = "npm run build"
  publish = "dist"

# Non-sensitive defaults — set TIMETAAG_AUTH_KEY and TIMETAAG_API_KEY in the Netlify dashboard.
[context.production.environment]
  TIMETAAG_CLIENT_DB_NAME = "tt_10000"

[context.deploy-preview.environment]
  TIMETAAG_CLIENT_DB_NAME = "tt_10000"

[[redirects]]
  from = "/*"
  to = "/"
  status = 200